<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
    <linearGradient id="gpu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="33%" style="stop-color:#0071c5"/>
      <stop offset="66%" style="stop-color:#ed1c24"/>
      <stop offset="100%" style="stop-color:#009a53"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="40" x2="1280" y2="40"/><line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="320"/><line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/><line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/><line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- GPU chip visualization -->
  <g transform="translate(80, 80)" filter="url(#glow)">
    <!-- Chip body -->
    <rect x="10" y="10" width="120" height="120" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
    <!-- Die -->
    <rect x="30" y="30" width="80" height="80" rx="4" fill="url(#gpu)" opacity="0.3"/>
    <rect x="40" y="40" width="60" height="60" rx="2" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
    <!-- Grid on die -->
    <g stroke="#a855f7" stroke-width="0.5" opacity="0.4">
      <line x1="40" y1="55" x2="100" y2="55"/><line x1="40" y1="70" x2="100" y2="70"/><line x1="40" y1="85" x2="100" y2="85"/>
      <line x1="55" y1="40" x2="55" y2="100"/><line x1="70" y1="40" x2="70" y2="100"/><line x1="85" y1="40" x2="85" y2="100"/>
    </g>
    <!-- Pins -->
    <g fill="#64748b" opacity="0.6">
      <rect x="25" y="0" width="4" height="12" rx="1"/><rect x="40" y="0" width="4" height="12" rx="1"/>
      <rect x="55" y="0" width="4" height="12" rx="1"/><rect x="70" y="0" width="4" height="12" rx="1"/>
      <rect x="85" y="0" width="4" height="12" rx="1"/><rect x="100" y="0" width="4" height="12" rx="1"/>
      <rect x="25" y="128" width="4" height="12" rx="1"/><rect x="40" y="128" width="4" height="12" rx="1"/>
      <rect x="55" y="128" width="4" height="12" rx="1"/><rect x="70" y="128" width="4" height="12" rx="1"/>
      <rect x="85" y="128" width="4" height="12" rx="1"/><rect x="100" y="128" width="4" height="12" rx="1"/>
      <rect x="0" y="25" width="12" height="4" rx="1"/><rect x="0" y="40" width="12" height="4" rx="1"/>
      <rect x="0" y="55" width="12" height="4" rx="1"/><rect x="0" y="70" width="12" height="4" rx="1"/>
      <rect x="0" y="85" width="12" height="4" rx="1"/><rect x="0" y="100" width="12" height="4" rx="1"/>
      <rect x="128" y="25" width="12" height="4" rx="1"/><rect x="128" y="40" width="12" height="4" rx="1"/>
      <rect x="128" y="55" width="12" height="4" rx="1"/><rect x="128" y="70" width="12" height="4" rx="1"/>
      <rect x="128" y="85" width="12" height="4" rx="1"/><rect x="128" y="100" width="12" height="4" rx="1"/>
    </g>
    <!-- Activity dots -->
    <circle cx="50" cy="50" r="3" fill="#76b900" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="60" r="3" fill="#0071c5" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="90" cy="50" r="3" fill="#ed1c24" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="60" cy="80" r="3" fill="#a855f7" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="80" cy="90" r="3" fill="#009a53" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>

  <!-- Speedup visualization - bar chart -->
  <g transform="translate(300, 60)">
    <!-- CPU bar -->
    <text x="0" y="12" font-family="-apple-system,sans-serif" font-size="11" fill="#64748b">CPU Baseline</text>
    <rect x="0" y="20" width="80" height="16" rx="3" fill="#475569" opacity="0.5"/>
    <text x="85" y="33" font-family="-apple-system,sans-serif" font-size="11" fill="#94a3b8">1.0x</text>
    <!-- GPU bar -->
    <text x="0" y="62" font-family="-apple-system,sans-serif" font-size="11" fill="#94a3b8">SYCL GPU</text>
    <rect x="0" y="70" width="300" height="16" rx="3" fill="url(#accent)" opacity="0.8"/>
    <text x="305" y="83" font-family="-apple-system,sans-serif" font-size="13" fill="#a855f7" font-weight="700">3-5x</text>
    <!-- Arrow -->
    <line x1="150" y1="42" x2="150" y2="66" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
    <polygon points="146,64 154,64 150,70" fill="#a855f7" opacity="0.5"/>
  </g>

  <!-- Title area -->
  <text x="660" y="70" font-family="-apple-system,sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="-0.5">AVM SYCL</text>
  <text x="660" y="105" font-family="-apple-system,sans-serif" font-size="20" font-weight="600" fill="#a855f7">GPU Acceleration</text>

  <!-- Tagline -->
  <text x="660" y="140" font-family="-apple-system,sans-serif" font-size="14" fill="#94a3b8">The Fastest Open-Source GPU Acceleration for AV2 Video Encoding</text>

  <!-- Feature pills -->
  <g transform="translate(660, 160)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1"/>
    <text x="45" y="19" font-family="-apple-system,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="600">3-5x Faster</text>

    <rect x="100" y="0" width="130" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1"/>
    <text x="165" y="19" font-family="-apple-system,sans-serif" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="600">Cross-Vendor GPU</text>

    <rect x="240" y="0" width="100" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="290" y="19" font-family="-apple-system,sans-serif" font-size="12" fill="#4ade80" text-anchor="middle" font-weight="600">Zero-Copy RTCD</text>
  </g>

  <!-- GPU vendor logos as text -->
  <g transform="translate(660, 220)">
    <text x="0" y="0" font-family="-apple-system,sans-serif" font-size="22" font-weight="800" fill="#76b900">NVIDIA</text>
    <text x="110" y="0" font-family="-apple-system,sans-serif" font-size="22" font-weight="800" fill="#0071c5">Intel</text>
    <text x="185" y="0" font-family="-apple-system,sans-serif" font-size="22" font-weight="800" fill="#ed1c24">AMD</text>
    <text x="250" y="0" font-family="-apple-system,sans-serif" font-size="22" font-weight="800" fill="#009a53">ARM</text>
  </g>

  <!-- Stats -->
  <g transform="translate(660, 260)">
    <text x="0" y="0" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#a855f7">4K@38fps</text>
    <text x="0" y="18" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">RTX 4090 Encoding</text>

    <text x="150" y="0" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#6366f1">20K</text>
    <text x="150" y="18" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">DCT/sec Throughput</text>

    <text x="270" y="0" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="#22c55e">BSD-3</text>
    <text x="270" y="18" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">Open Source License</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#gpu)" rx="2"/>
</svg>
